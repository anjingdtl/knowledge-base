name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff mypy
      - run: ruff check src tests evals tools scripts
      - run: python -m mypy src tools --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -e ".[dev,api,gui,parsers,wiki]"
      - run: pytest tests/ -v --tb=short -x
        env:
          PYTHONPATH: .

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  architecture-closure:
    name: Architecture Closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Report closure debt
        run: python tools/report_closure_debt.py
        env:
          PYTHONPATH: .
      - name: Architecture tests
        run: pytest tests/architecture/ -q --tb=short
        env:
          PYTHONPATH: .

  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Strict Alembic / migration suite
        run: |
          pytest tests/migrations/ tests/test_alembic_baseline.py tests/storage/ -q --tb=short
        env:
          PYTHONPATH: .
          SHINEHE_ENFORCE_MIGRATION_GATE: "1"

  contract-gate:
    name: Contract Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: pip install -e ".[dev,api,parsers,wiki]"
      - name: Public Search/Ask/MCP contracts
        run: |
          pytest \
            tests/test_public_search_contract.py \
            tests/test_public_ask_contract.py \
            tests/test_mcp_contract.py \
            -q --tb=short
        env:
          PYTHONPATH: .

  retrieval-eval:
    name: Retrieval Eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,parsers]"
      - name: Validate eval datasets
        run: pytest tests/test_eval_datasets.py -v --tb=short
        env:
          PYTHONPATH: .
      - name: Run retrieval eval (fake-embedding mode)
        run: |
          python evals/run_retrieval_eval.py \
            --all \
            --fake-embedding \
            --baseline evals/baselines/local.json \
            --max-regression 0.05 \
            --report json \
            --output retrieval_report.json
        env:
          PYTHONPATH: .
      - name: Upload retrieval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-eval-report
          path: retrieval_report.json
          retention-days: 30
      - name: Run verified hybrid eval (offline golden set)
        run: |
          python evals/run_hybrid_eval.py --strict --json --output hybrid_report.json
          pytest tests/test_hybrid_eval.py -v --tb=short
        env:
          PYTHONPATH: .
      - name: Upload hybrid report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-eval-report
          path: hybrid_report.json
          retention-days: 30

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build --target api --tag shinehe-api:ci .
      - run: docker build --target mcp --tag shinehe-mcp:ci .
      - name: API health smoke
        run: |
          docker run --detach --rm --name shinehe-api-smoke -p 8000:8000 shinehe-api:ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/api/health; then exit 0; fi
            sleep 1
          done
          docker logs shinehe-api-smoke
          exit 1
      - name: Stop API smoke
        if: always()
        run: docker rm --force shinehe-api-smoke || true

  windows-smoke:
    name: Windows Runtime Smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,api,parsers,wiki]"
      - name: Run isolated Windows smoke
        shell: pwsh
        run: ./scripts/windows-smoke.ps1 -RepoRoot $PWD -PythonExe python
