name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff mypy
      - run: ruff check src/ --select=E9,F63,F7,F82
      - name: Type check (advisory baseline)
        continue-on-error: true
        run: mypy src --ignore-missing-imports --no-error-summary

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,api,parsers,wiki]"
      - run: pytest tests/ -v --tb=short -x
        env:
          PYTHONPATH: .

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  retrieval-eval:
    name: Retrieval Eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,parsers]"
      - name: Validate eval datasets
        run: pytest tests/test_eval_datasets.py -v --tb=short
        env:
          PYTHONPATH: .
      - name: Run retrieval eval (fake-embedding mode)
        run: |
          python evals/run_retrieval_eval.py \
            --all \
            --fake-embedding \
            --baseline evals/baselines/local.json \
            --max-regression 0.05 \
            --report json \
            --output retrieval_report.json
        env:
          PYTHONPATH: .
      - name: Upload retrieval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-eval-report
          path: retrieval_report.json
          retention-days: 30

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target api .
      - run: docker build --target mcp .
