appearance:
  font_size: 14
  theme: light
embedding:
  base_url: https://api.siliconflow.cn/v1
  model: BAAI/bge-m3
  provider: Minimax
  reuse_llm: true
graph_backend:
  database: neo4j
  provider: neo4j
  uri: bolt://localhost:7687
  user: neo4j
llm:
  base_url: https://api.minimaxi.com/v1
  max_tokens: 2048
  model: MiniMax-M2.7
  provider: Minimax
  temperature: 0.7
mcp:
  enable_legacy_aliases: true
  experimental_tools_enabled: true
  tool_profile: extended
  allow_http_write: true
  write_policy: ""
rag:
  chunk_overlap: 150
  chunk_size: 1000
  score_threshold: 0.35
  top_k: 5
reranker:
  base_url: ''
  enabled: true
  model: ''
  provider: ''
  reuse_llm: false
  use_llm_fallback: true
storage:
  data_dir: data
  db_name: kb.db
  graph_dir: graph
wiki:
  enabled: true
