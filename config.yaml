appearance:
  font_size: 14
  theme: dark
embedding:
  base_url: https://api.siliconflow.cn/v1
  model: BAAI/bge-m3
  provider: siliconflow
  reuse_llm: false
graph_backend:
  database: neo4j
  provider: sqlite
  uri: bolt://localhost:7687
  user: neo4j
llm:
  base_url: https://api.minimaxi.com/v1
  max_tokens: 2048
  model: MiniMax-M3
  provider: Minimax
  temperature: 0.7
mcp:
  allow_http_write: true
  enable_legacy_aliases: true
  experimental_tools_enabled: true
  tool_profile: full
  write_policy: ''
rag:
  chunk_overlap: 150
  chunk_size: 1000
  score_threshold: 0.35
  top_k: 5
  # Phase 2: legacy chunk vector path (vec_chunks), default off
  legacy_chunk_vector: false
  # Phase 2: RRF fusion parameters
  rrf_k: 40
  rrf_weight_semantic: 0.4
  rrf_weight_keyword: 0.6
  # Phase 2: planetary router
  use_planetary_router: true
  route_llm_timeout: 5
  # Phase 3: pipeline parallelization
  pipeline:
    generate_parallel: true
    stream_generate: false
  # Phase 3: three-level cache
  cache:
    l1_embedding_max: 2048
    l1_rag_max: 256
    l1_rag_ttl: 600
    l2_enabled: true
    l2_ttl_hours: 168
  # Phase 3: observability
  observability:
    trace_enabled: true
    debug_scores: false
    health_check_cron: "0 3 * * *"
  # Phase 3: ask_with_query async & timeout
  ask_with_query:
    total_timeout: 120
    route_timeout: 5
    async_mode: false
reranker:
  base_url: https://api.siliconflow.cn/v1
  enabled: true
  model: BAAI/bge-reranker-v2-m3
  provider: siliconflow
  reuse_llm: false
  use_llm_fallback: true
storage:
  data_dir: data
  db_name: kb.db
  graph_dir: graph
wiki:
  auto_save_answer: false
  auto_save_min_length: 500
  enabled: true
