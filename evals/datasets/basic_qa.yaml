  tags: [wiki, workflow]

- question: "MCP Server 的运行模式有哪些？"
  expected_answer_summary: "stdio 和 streamable-http 两种模式"
  relevant_knowledge_ids: []
  tags: [mcp, transport]

- question: "如何配置 Neo4j 作为图后端？"
  expected_answer_summary: "在 config.yaml 中设置 graph_backend.provider 为 neo4j，并配置 uri、user、password"
  relevant_knowledge_ids: []
  tags: [graph, neo4j, config]

- question: "Block 是什么概念？"
