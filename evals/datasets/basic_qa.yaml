  tags: [embedding, model]

- question: "系统支持哪些文件类型导入？"
  expected_answer_summary: "PDF, DOCX, XLSX, PPTX, Markdown, 纯文本等"
  relevant_knowledge_ids: []
  tags: [import, file_types]

- question: "混合搜索是如何工作的？"
  expected_answer_summary: "结合向量搜索和关键词搜索，使用 RRF 融合排序"
  relevant_knowledge_ids: []
  tags: [search, hybrid]

- question: "Wiki 系统的工作流状态有哪些？"
  expected_answer_summary: "draft, review, published, deprecated"
