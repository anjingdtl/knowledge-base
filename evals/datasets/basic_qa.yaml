- question: "RAG 管线包含哪些阶段？"
  expected_answer_summary: "query_rewrite, wiki_retrieval, vector_search, rerank, generate, postprocess"
  relevant_knowledge_ids: []
  tags: [rag, pipeline]

- question: "向量搜索使用的是什么模型？"
  expected_answer_summary: "BAAI/bge-m3"
