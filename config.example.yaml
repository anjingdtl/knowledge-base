# ShineHeKnowledge 配置示例
# 复制为 config.yaml 并填入真实值
# 敏感字段（标记为 <SECRET>）建议通过环境变量或 keyring 管理

appearance:
  font_size: 14
  theme: dark
embedding:
  base_url: https://api.siliconflow.cn/v1   # 或其他 OpenAI 兼容端点
  model: BAAI/bge-m3
  provider: 硅基流动
  reuse_llm: true
  timeout: 30
  # api_key: <SECRET>   # 通过 keyring 管理，或设置环境变量 SHINEHE_EMBEDDING_API_KEY
ingest:
  docx:
    paragraph_count_threshold: 200
  excel:
    sheet_count_threshold: 5
  pdf:
    page_count_threshold: 50
  size_threshold_bytes: 5000000
jobs:
  max_workers: 2
  poll_interval: 1.0
librarian:
  batch_size: 5
llm:
  base_url: https://api.minimaxi.com/v1   # 或其他 OpenAI 兼容端点
  max_tokens: 2048
  model: MiniMax-M3
  provider: Minimax
  temperature: 0.7
  timeout: 60
  # api_key: <SECRET>   # 通过 keyring 管理，或设置环境变量 SHINEHE_LLM_API_KEY
rag:
  agentic_router:
    enabled: true
    prefer_llm: false
    system_prompt_max_tokens: 2000
  chunk_overlap: 180
  chunk_size: 1200
  context_sibling_window: 1
  context_trace_depth: 3
  custom_stages: []
  embedding_context:
    enabled: true
    include_links: true
    include_parent_chain: true
    include_siblings: false
    max_chars: 1200
  enable_query_rewriting: true
  enable_rerank: true
  hybrid_search:
    candidate_multiplier: 3
    enabled: true
    keyword_weight: 0.3
    vector_weight: 0.7
  import:
    docx:
      respect_styles: true
      table_structured: true
    excel:
      max_rows_per_sheet: 500
      row_naming: first_column
    pdf:
      heading_detection: true
      page_as_block: true
  link_expansion:
    max_links: 3
  max_blocks_per_document: 3
  parent_child:
    enabled: true
    max_parent_chars: 4000
  pipeline:
    enabled: true
    stages:
    - enabled: true
      mode: llm
      num_variations: 3
      stage: query_rewrite
    - enabled: true
      limit: 3
      stage: wiki_retrieval
    - enabled: true
      mode: blend
      stage: vector_search
      top_k: 10
    - enabled: true
      min_score: 0.15
      stage: rerank
      top_n: 5
    - enabled: true
      max_tokens: 2048
      stage: generate
      temperature: 0.7
    - dedup: true
      enabled: true
      max_context_length: 8000
      stage: postprocess
  rerank:
    min_score: 0.15
    top_n: 5
  score_threshold: 0.35
  search_mode: blend
  stage_timeout:
    hybrid_search: 25
    query_rewrite: 15
    rerank: 20
    wiki_search: 5
  top_k: 8
reranker:
  enabled: true
  provider: ""            # "" | api | local | llm | disabled
  base_url: https://api.siliconflow.cn/v1
  model: BAAI/bge-reranker-v2-m3
  use_llm_fallback: true
  reuse_llm: false
  # api_key: <SECRET>   # 通过 keyring 管理，或设置环境变量 SHINEHE_RERANKER_API_KEY
safety:
  operation_log:
    enabled: true
    retention_days: 90
mcp:
  tool_profile: extended    # core | extended | admin | full | legacy
  enable_legacy_aliases: false
  experimental_tools_enabled: false
  write_policy: ""          # 写操作安全策略: "" | preview_only | local_confirm | token_required | disabled
  allow_http_write: false   # HTTP 模式是否允许写操作
  bind_host: 127.0.0.1     # MCP HTTP 服务绑定地址
  auth_token: ""            # write_policy=token_required 时使用的认证 token
graph_backend:
  provider: sqlite          # SQLite-only graph storage
storage:
  chroma_dir: chroma
  data_dir: data
  db_name: kb.db
  graph_dir: graph
watcher:
  debounce_ms: 500
  recursive: true
web:
  timeout: 30
wiki:
  auto_compile: true
  auto_link: true
  auto_publish: true
  enabled: true
  lint_contradictions: false
  max_llm_calls_per_ingest: 3
  query_save_min_length: 100
  site:
    base_url: ''
    enabled: false
    landing_page_sections:
    - project_intro
    - recent_articles
    - categories
    - stats
    site_description: 企业知识库 Wiki 系统
    site_title: 知识库 Wiki
    static_output_dir: wiki_site
