# ShineHeKnowledge 配置示例
# 复制为 config.yaml 并填入真实值
# 敏感字段（标记为 <SECRET>）建议通过环境变量或 keyring 管理

appearance:
  font_size: 14
  theme: dark
embedding:
  base_url: https://api.siliconflow.cn/v1   # 或其他 OpenAI 兼容端点
  model: BAAI/bge-m3
  provider: 硅基流动
  reuse_llm: true
  timeout: 30
  # api_key: <SECRET>   # 通过 keyring 管理，或设置环境变量 SHINEHE_EMBEDDING_API_KEY
ingest:
  docx:
    paragraph_count_threshold: 200
  excel:
    sheet_count_threshold: 5
  pdf:
    page_count_threshold: 50
  size_threshold_bytes: 5000000
jobs:
  max_workers: 2
  poll_interval: 1.0
librarian:
  batch_size: 5
llm:
  base_url: https://api.minimaxi.com/v1   # 或其他 OpenAI 兼容端点
  max_tokens: 2048
  model: MiniMax-M3
  provider: Minimax
  temperature: 0.7
  timeout: 60
  # api_key: <SECRET>   # 通过 keyring 管理，或设置环境变量 SHINEHE_LLM_API_KEY
# Phase-2 / closure WP1 retrieval orchestration: legacy | shadow | unified
# Default unified is the formal path; set legacy for emergency rollback.
retrieval:
  orchestrator: unified
# Phase-3 answer orchestration: legacy | shadow | unified
# Default unified (same assemble path as legacy; structural parity).
answer:
  orchestrator: unified
rag:
  agentic_router:
    enabled: true
    prefer_llm: false
    system_prompt_max_tokens: 2000
  # 规模自适应路由（authoring 默认 enabled；verified/evidence_only 默认 false）
  size_aware:
    enabled: false
    small_query_max_tokens: 12
    small_wiki_page_threshold: 3
    intent_words_large: ["哪些", "所有", "对比", "全部", "列举"]
    llm_fallback: false
  # wiki parent-child（仅 authoring 路径介入）
  wiki_parent_child:
    enabled: false
    max_parent_chars: 2000
  # 中文 lexical 强化（authoring 可开）
  lexical_zh:
    enabled: false
    dict_path: data/lexical_zh_dict.txt
    synonym_path: data/lexical_zh_synonyms.txt
  # RRF keyword 权重按语种
  rrf_weight_keyword_zh: 0.7
  rrf_weight_keyword_en: 0.5
  # Wiki FS 读：sqlite fallback
  wiki_read:
    sqlite_fallback: true
  # Phase 3 融合将消费；Phase 1 仅配置契约
  verified_knowledge:
    enabled: true
    raw_candidate_multiplier: 3
    wiki_candidate_multiplier: 2
    raw_weight: 0.60
    wiki_weight: 0.40
    evidence_alignment_enabled: true
    stale_fallback_to_raw: true
    empty_wiki_fallback_to_raw: true
  chunk_overlap: 180
  chunk_size: 1200
  context_sibling_window: 1
  context_trace_depth: 3
  custom_stages: []
  embedding_context:
    enabled: true
    include_links: true
    include_parent_chain: true
    include_siblings: false
    max_chars: 1200
  enable_query_rewriting: true
  enable_rerank: true
  hybrid_search:
    candidate_multiplier: 3
    enabled: true
    keyword_weight: 0.3
    vector_weight: 0.7
  import:
    docx:
      respect_styles: true
      table_structured: true
    excel:
      max_rows_per_sheet: 500
      row_naming: first_column
    pdf:
      heading_detection: true
      page_as_block: true
  link_expansion:
    max_links: 3
  max_blocks_per_document: 3
  parent_child:
    enabled: true
    max_parent_chars: 4000
  pipeline:
    enabled: true
    stages:
    - enabled: true
      mode: llm
      num_variations: 3
      stage: query_rewrite
    - enabled: true
      limit: 3
      stage: wiki_retrieval
    - enabled: true          # size-aware: 小/混合查询读 wiki(零向量);legacy 空操作
      stage: wiki_read
    - enabled: true
      mode: blend
      stage: vector_search
      top_k: 10
    - enabled: true
      min_score: 0.15
      stage: rerank
      top_n: 5
    - enabled: true
      max_tokens: 2048
      stage: generate
      temperature: 0.7
    - dedup: true
      enabled: true
      max_context_length: 8000
      stage: postprocess
  rerank:
    min_score: 0.15
    top_n: 5
  score_threshold: 0.35
  search_mode: hybrid_verified   # verified 默认；evidence_only 用 blend
  stage_timeout:
    hybrid_search: 25
    query_rewrite: 15
    rerank: 20
    wiki_search: 5
  top_k: 8
reranker:
  enabled: true
  provider: ""            # "" | api | local | llm | disabled
  base_url: https://api.siliconflow.cn/v1
  model: BAAI/bge-reranker-v2-m3
  use_llm_fallback: true
  reuse_llm: false
  # api_key: <SECRET>   # 通过 keyring 管理，或设置环境变量 SHINEHE_RERANKER_API_KEY
safety:
  operation_log:
    enabled: true
    retention_days: 90
# 知识运行档位（融合收束 Spec §4–§5）
# verified（默认）| authoring | evidence_only
# 兼容旧值：wiki_first → authoring，legacy → evidence_only（不自动改写用户文件）
knowledge_workflow:
  mode: verified
  raw_dir: raw
  wiki_dir: wiki
  schema_file: schema/AGENTS.md
  source_summary_dir: wiki/sources
  entity_dir: wiki/entities
  concept_dir: wiki/concepts
  synthesis_dir: wiki/syntheses
  comparison_dir: wiki/comparisons
  maintain_index_md: true
  maintain_log_md: true
mcp:
  tool_profile: core           # verified 默认 core；authoring 建议 extended
  enable_legacy_aliases: false
  experimental_tools_enabled: false  # verified 关闭；authoring 可 true
  write_policy: disabled       # verified 默认 disabled；authoring 建议 local_confirm
  allow_http_write: false   # HTTP 模式是否允许写操作
  bind_host: 127.0.0.1     # MCP HTTP 服务绑定地址
  auth_token: ""            # write_policy=token_required 时使用的认证 token
graph_backend:
  provider: sqlite          # SQLite-only graph storage
storage:
  data_dir: data
  db_name: kb.db
  graph_dir: graph
watcher:
  debounce_ms: 500
  recursive: true
web:
  timeout: 30
wiki:
  enabled: true
  read_enabled: true             # verified/authoring：读已验证 Claim
  authoring_enabled: false       # 仅 authoring 模式为 true
  auto_compile: false            # verified 关闭；authoring 可 true
  auto_link: true
  auto_publish: false            # review gate:永不默认自动发布
  lint_contradictions: true      # 启用 wiki lint 闭环
  max_llm_calls_per_ingest: 3
  query_save_min_length: 100
  serving:                       # Phase 2 Gate 将消费；Phase 1 先落配置契约
    enabled: true
    allowed_claim_statuses:
      - active
    require_block_evidence: true
    exclude_stale: true
    exclude_unsupported: true
    exclude_retracted: true
    require_validation_passed: true
    require_review_approved: true
    require_published_revision: true
    on_failure: raw_fallback
  canonical_v2:                 # 写入迁移阶段（与回答 Serving 分离）
    mode: "off"                 # off | shadow | canary | primary(off=legacy 零变化)
    canary:
      knowledge_ids: []         # Phase 4B:显式 knowledge_id allowlist
      source_paths: []          # Phase 4B:显式 source_path/目录 allowlist
      refines_auto_merge_min_score: 0.90
      auto_repair_projection: true
    projection_fallback_to_filesystem: true
    compatibility_read_legacy_sqlite: true
    compatibility_write_legacy_sqlite: false
  claims:                       # Claim 抽取/匹配配置(spec §9)
    enabled: true
    max_claims_per_ingest: 30
    max_llm_calls_per_ingest: 4
    exact_match_threshold: 1.0
    semantic_match_threshold: 0.88
    unresolved_threshold: 0.72
    require_block_evidence: true
  rebuild:                      # 来源失效传播(Phase 5)
    auto_on_source_update: false
    auto_publish_low_risk: false
    max_pages_per_job: 100
    max_depth: 5
    debounce_ms: 500            # per-kid 合并窗口(对齐 watcher.debounce_ms)
    auto_allowlist:             # canary 级:与 canonical_v2.canary 解耦;默认空=纯 manual
      knowledge_ids: []
      source_paths: []
  projection:                   # SQLite projection(outbox + 幂等重建)
    enabled: true
    auto_consume_outbox: true
    fallback_to_full_rebuild: true
    max_retry: 5
  validation:                   # canonical 校验门控
    block_publish_on_error: true
    block_publish_on_warning: false
  site:
    base_url: ''
    enabled: false
    landing_page_sections:
    - project_intro
    - recent_articles
    - categories
    - stats
    site_description: 企业知识库 Wiki 系统
    site_title: 知识库 Wiki
    static_output_dir: wiki_site

# 维护中心（融合收束 Spec §5.6 / Phase 5）
# 与 mcp.write_policy 分离：系统保护性维护可自动执行，语义变更仍需人工
maintenance:
  enabled: true
  center_enabled: true
  # observe | supervised | managed — verified 默认 supervised
  automation_level: supervised
  policy:
    allow_observation: true
    auto_protective_actions: true
    auto_mark_evidence_stale: true
    auto_downgrade_unsupported_claims: true
    auto_move_affected_pages_to_review: true
    auto_exclude_ineligible_claims_from_serving: true
    auto_retry_failed_jobs: true
    auto_recover_outbox: true
    auto_rebuild_projection_on_safe_drift: false
    auto_reindex_missing_blocks: false
    auto_generate_claim_drafts: false
    auto_generate_page_drafts: false
    auto_generate_correction_suggestions: true
    auto_merge_claims: false
    auto_resolve_conflicts: false
    auto_publish: false
    auto_retract: false
    auto_delete: false
    auto_migrate_primary: false
  review:
    require_human_for_risk_at_or_above: R3
  health:
    snapshot_enabled: true
    require_validation_passed: true
    unresolved_policy: disclose
    contradiction_policy: disclose
    on_failure: raw_fallback
    max_claims_per_query: 8
    max_evidence_per_claim: 3
