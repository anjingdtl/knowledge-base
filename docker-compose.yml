services:
  shinehe-api:
    build:
      context: .
      target: api
    image: shinehe/knowledge-base:${VERSION:-latest}
    container_name: shinehe-kb-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  shinehe-mcp:
    build:
      context: .
      target: mcp
    image: shinehe/knowledge-base-mcp:${VERSION:-latest}
    container_name: shinehe-kb-mcp
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_TRANSPORT=streamable-http
    ports:
      - "9000:9000"
    profiles:
      - mcp
    restart: unless-stopped
