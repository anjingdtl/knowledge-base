  <style id="project-shell-style">
    /* ========== 应用骨架：ShineHeKnowledge 桌面端外壳 ==========
       FLAT 设计（无阴影），大圆角，Fraunces 衬线优先。
       颜色变量为 HSL 分量格式，引用时统一使用 hsl(var(--token)) 包裹。 */

    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      overflow: hidden;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: var(--font-sans);
    }

    /* ---------- 侧边栏 ---------- */
    .sidebar {
      background: hsl(var(--sidebar));
      color: hsl(var(--sidebar-foreground));
      border-right: 1px solid hsl(var(--sidebar-border));
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-brand {
      display: flex;
      flex-direction: column;
      gap: calc(var(--spacing) * 1);
      padding: calc(var(--spacing) * 5) calc(var(--spacing) * 5) calc(var(--spacing) * 4);
      border-bottom: 1px solid hsl(var(--sidebar-border));
    }

    .brand-kicker {
      color: hsl(var(--muted-foreground));
      font-size: 0.76rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .brand-name {
      font-family: var(--font-sans);
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.12;
      color: hsl(var(--sidebar-foreground));
      letter-spacing: -0.01em;
    }

    .sidebar-nav {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: calc(var(--spacing) * 1.5);
      padding: calc(var(--spacing) * 4) calc(var(--spacing) * 4);
    }

    .nav-section-label {
      color: hsl(var(--muted-foreground));
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding-left: calc(var(--spacing) * 2.5);
      padding-bottom: calc(var(--spacing) * 0.5);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: calc(var(--spacing) * 2.5);
      min-height: 44px;
      padding: calc(var(--spacing) * 2) calc(var(--spacing) * 2.5);
      border-radius: calc(var(--radius) - 9px);
      border: 1px solid transparent;
      background: transparent;
      color: hsl(var(--sidebar-foreground));
      text-decoration: none;
      font-family: var(--font-sans);
      font-size: 0.98rem;
      line-height: 1.2;
      transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .nav-item:hover {
      background: hsl(var(--sidebar-accent));
      color: hsl(var(--sidebar-accent-foreground));
    }

    .nav-item:focus-visible {
      outline: 2px solid hsl(var(--ring));
      outline-offset: 2px;
    }

    .nav-item.is-active {
      background: hsl(var(--sidebar-primary));
      color: hsl(var(--sidebar-primary-foreground));
    }

    .nav-icon {
      width: 1.25rem;
      height: 1.25rem;
      flex: 0 0 auto;
    }

    .nav-label {
      white-space: nowrap;
    }

    .sidebar-footer {
      display: flex;
      flex-direction: column;
      gap: calc(var(--spacing) * 1.5);
      padding: calc(var(--spacing) * 4) calc(var(--spacing) * 5);
      border-top: 1px solid hsl(var(--sidebar-border));
    }

    .mcp-status {
      display: flex;
      align-items: center;
      gap: calc(var(--spacing) * 1.8);
      font-size: 0.86rem;
      color: hsl(var(--muted-foreground));
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: hsl(var(--secondary));
      flex: 0 0 auto;
    }

    .version-meta {
      font-size: 0.76rem;
      color: hsl(var(--muted-foreground));
      letter-spacing: 0.02em;
    }

    /* ---------- 主区域 + 顶栏 ---------- */
    .main-area {
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 0;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: calc(var(--spacing) * 4);
      padding: calc(var(--spacing) * 4) calc(var(--spacing) * 6);
      border-bottom: 1px solid hsl(var(--border));
      background: hsl(var(--background));
      flex: 0 0 auto;
    }

    .topbar-left {
      display: flex;
      flex-direction: column;
      gap: calc(var(--spacing) * 1);
      min-width: 0;
    }

    .page-title {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.15;
      color: hsl(var(--foreground));
      text-wrap: balance;
    }

    .page-subtitle {
      margin: 0;
      font-size: 0.9rem;
      color: hsl(var(--muted-foreground));
      line-height: 1.4;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: calc(var(--spacing) * 2.5);
      flex: 0 0 auto;
    }

    .search-field {
      display: flex;
      align-items: center;
      gap: calc(var(--spacing) * 1.8);
      min-width: 16rem;
      padding: 0 calc(var(--spacing) * 2.5);
      background: hsl(var(--background));
      border: 1px solid hsl(var(--input));
      border-radius: calc(var(--radius) - 8px);
      min-height: 40px;
      transition: border-color 0.18s ease;
    }

    .search-field [data-icon] {
      width: 1rem;
      height: 1rem;
      color: hsl(var(--muted-foreground));
      flex: 0 0 auto;
    }

    .search-input {
      width: 100%;
      border: 0;
      background: transparent;
      color: hsl(var(--foreground));
      font-family: var(--font-sans);
      font-size: 0.92rem;
      outline: none;
    }

    .search-input::placeholder {
      color: hsl(var(--muted-foreground));
    }

    .search-field:focus-within {
      border-color: hsl(var(--ring));
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: calc(var(--spacing) * 1.6);
      min-height: 44px;
      padding: calc(var(--spacing) * 2.2) calc(var(--spacing) * 4);
      border: 1px solid transparent;
      border-radius: calc(var(--radius) - 8px);
      font-family: var(--font-sans);
      font-size: 0.96rem;
      font-weight: 500;
      line-height: 1.2;
      cursor: pointer;
      transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .btn-primary {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
    }

    .btn-primary:hover {
      background: hsl(var(--primary));
      filter: brightness(0.96);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:focus-visible {
      outline: 2px solid hsl(var(--ring));
      outline-offset: 2px;
    }

    .btn [data-icon] {
      width: 1rem;
      height: 1rem;
      flex: 0 0 auto;
    }

    /* ---------- 内容容器（叶子页填充区） ---------- */
    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: calc(var(--spacing) * 4);
      background: hsl(var(--background));
    }

    /* ---------- 图标 mask 映射（图标位于项目 assets/icons/dl_builtin_golden_time/） ---------- */
    [data-icon="box"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/box.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/box.svg');
    }
    [data-icon="message-circle-more"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/message-circle-more.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/message-circle-more.svg');
    }
    [data-icon="folder-open"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/folder-open.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/folder-open.svg');
    }
    [data-icon="file"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/file.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/file.svg');
    }
    [data-icon="grip"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/grip.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/grip.svg');
    }
    [data-icon="trash-2"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/trash-2.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/trash-2.svg');
    }
    [data-icon="pen-line"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/pen-line.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/pen-line.svg');
    }
    [data-icon="funnel"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/funnel.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/funnel.svg');
    }
    [data-icon="circle-plus"] {
      -webkit-mask-image: url('../assets/icons/dl_builtin_golden_time/circle-plus.svg');
      mask-image: url('../assets/icons/dl_builtin_golden_time/circle-plus.svg');
    }

    /* ---------- 动效无障碍降级 ---------- */
    @media (prefers-reduced-motion: reduce) {
      .nav-item, .btn, .search-field {
        transition: none;
      }
      .btn-primary:hover {
        transform: none;
      }
    }

    /* ---------- 侧栏滚动条收起 ---------- */
    .sidebar-nav {
      scrollbar-width: thin;
      scrollbar-color: hsl(var(--sidebar-border)) transparent;
    }
    .sidebar-nav::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar-nav::-webkit-scrollbar-thumb {
      background: hsl(var(--sidebar-border));
      border-radius: 999px;
    }
  </style>
  <script>lucide.createIcons();</script>
</body>
</html>
